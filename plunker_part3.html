<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plunker — Browser FPS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; }

/* ── Lock‑screen overlay ── */
#lock-screen {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.85); color: #fff; font-family: 'Segoe UI', sans-serif;
  cursor: pointer; user-select: none;
}
#lock-screen h1 { font-size: 52px; letter-spacing: 4px; margin-bottom: 12px; }
#lock-screen p  { font-size: 18px; opacity: 0.7; }
#lock-screen .controls { margin-top: 24px; font-size: 14px; opacity: 0.5; line-height: 1.8; }
#lock-screen.hidden { display: none; }

/* ── HUD ── */
#hud {
  position: fixed; inset: 0; z-index: 50;
  pointer-events: none; font-family: 'Segoe UI', sans-serif;
}

/* Crosshair */
#crosshair {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 24px; height: 24px;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.9);
}
#crosshair::before { width: 2px; height: 24px; left: 11px; top: 0; }
#crosshair::after  { width: 24px; height: 2px; top: 11px; left: 0; }

/* Health bar — bottom left */
#health-wrap {
  position: absolute; bottom: 28px; left: 28px;
  display: flex; align-items: center; gap: 10px;
}
#health-icon { font-size: 22px; color: #ff4444; }
#health-bar-bg {
  width: 180px; height: 14px; background: rgba(255,255,255,0.15);
  border-radius: 3px; overflow: hidden;
}
#health-bar {
  width: 100%; height: 100%; background: #ff4444;
  transition: width 0.25s ease;
}
#health-text { color: #fff; font-size: 16px; font-weight: 700; min-width: 32px; }

/* Ammo — bottom right */
#ammo-wrap {
  position: absolute; bottom: 28px; right: 28px;
  display: flex; align-items: baseline; gap: 6px; color: #fff;
}
#ammo-clip  { font-size: 36px; font-weight: 700; }
#ammo-sep   { font-size: 20px; opacity: 0.5; }
#ammo-total { font-size: 20px; opacity: 0.7; }

/* Weapon class label — above ammo */
#weapon-label {
  position: absolute; bottom: 70px; right: 28px;
  color: #fff; font-size: 14px; font-weight: 600; opacity: 0.7;
  text-transform: uppercase; letter-spacing: 2px;
}

/* Class selector hint */
#class-hint {
  position: absolute; bottom: 92px; right: 28px;
  color: rgba(255,255,255,0.35); font-size: 11px; font-family: monospace;
}

/* Kills — top right */
#kills {
  position: absolute; top: 20px; right: 28px;
  color: #fff; font-size: 18px; font-weight: 600;
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}

/* FPS — top left */
#fps {
  position: absolute; top: 20px; left: 20px;
  color: rgba(255,255,255,0.5); font-size: 13px; font-family: monospace;
}

/* Kill feed — below kills */
#kill-feed {
  position: absolute; top: 48px; right: 28px;
  display: flex; flex-direction: column; gap: 4px;
}
.kill-entry {
  color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 500;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  opacity: 1; transition: opacity 0.5s;
  white-space: nowrap;
}
.kill-entry.fading { opacity: 0; }

/* Speed indicator — bottom center */
#speed-indicator {
  position: absolute; bottom: 28px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.4); font-size: 13px; font-family: monospace;
}

/* Reload text */
#reload-text {
  position: absolute; top: 55%; left: 50%;
  transform: translate(-50%, -50%);
  color: #fff; font-size: 20px; font-weight: 600;
  text-shadow: 0 1px 6px rgba(0,0,0,0.7);
  opacity: 0; transition: opacity 0.15s;
}
#reload-text.visible { opacity: 1; }

/* Hit marker */
#hitmarker {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 30px; height: 30px; opacity: 0;
  pointer-events: none;
}
#hitmarker.show { opacity: 1; }
#hitmarker::before, #hitmarker::after {
  content: ''; position: absolute; background: #fff;
}
#hitmarker::before {
  width: 2px; height: 10px; left: 14px; top: 0;
  box-shadow: 0 20px 0 #fff;
}
#hitmarker::after {
  width: 10px; height: 2px; top: 14px; left: 0;
  box-shadow: 20px 0 0 #fff;
}
#hitmarker.headshot::before, #hitmarker.headshot::after { background: #ff4444; }
#hitmarker.headshot::before { box-shadow: 0 20px 0 #ff4444; }
#hitmarker.headshot::after  { box-shadow: 20px 0 0 #ff4444; }

/* Headshot banner */
#headshot-banner {
  position: absolute; top: 38%; left: 50%;
  transform: translate(-50%, -50%);
  color: #ffd700; font-size: 28px; font-weight: 900;
  letter-spacing: 3px;
  text-shadow: 0 0 15px rgba(255,215,0,0.6), 0 2px 4px rgba(0,0,0,0.5);
  opacity: 0; transition: opacity 0.15s;
}
#headshot-banner.visible { opacity: 1; }

/* Floating damage numbers container */
#damage-numbers {
  position: fixed; inset: 0; z-index: 55;
  pointer-events: none; overflow: hidden;
}
.dmg-num {
  position: absolute; font-weight: 900; font-family: 'Segoe UI', sans-serif;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  pointer-events: none; white-space: nowrap;
  animation: dmgFloat 0.8s ease-out forwards;
}
.dmg-num.body { color: #fff; font-size: 18px; }
.dmg-num.head { color: #ffd700; font-size: 24px; }
@keyframes dmgFloat {
  0%   { opacity: 1; transform: translateY(0) scale(1.2); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}

/* Death screen */
#death-screen {
  position: fixed; inset: 0; z-index: 90;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(139,0,0,0.5);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
#death-screen.visible { opacity: 1; }
#death-screen h2 {
  font-size: 64px; color: #ff2222; font-family: 'Segoe UI', sans-serif;
  font-weight: 900; letter-spacing: 6px;
  text-shadow: 0 0 30px rgba(255,0,0,0.6);
}
#death-stats {
  margin-top: 16px; color: rgba(255,255,255,0.7); font-size: 18px;
  font-family: 'Segoe UI', sans-serif;
}
#death-countdown {
  margin-top: 8px; color: rgba(255,255,255,0.5); font-size: 16px;
  font-family: monospace;
}

/* Damage vignette */
#damage-vignette {
  position: fixed; inset: 0; z-index: 40;
  pointer-events: none; opacity: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.4) 100%);
  transition: opacity 0.15s;
}
#damage-vignette.flash { opacity: 1; }

/* Weapon view model canvas */
#weapon-canvas {
  position: fixed; bottom: 0; right: 0;
  width: 280px; height: 200px;
  z-index: 45; pointer-events: none;
}

/* Bolt action overlay */
#bolt-text {
  position: absolute; top: 58%; left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255,255,255,0.6); font-size: 16px; font-weight: 600;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
  opacity: 0; transition: opacity 0.15s;
}
#bolt-text.visible { opacity: 1; }
</style>
</head>
<body>

<!-- Lock screen -->
<div id="lock-screen">
  <h1>PLUNKER</h1>
  <p>Click to play</p>
  <div class="controls">
    WASD — Move &nbsp;|&nbsp; Space — Jump &nbsp;|&nbsp; Shift — Crouch/Slide<br>
    LMB — Shoot &nbsp;|&nbsp; RMB — ADS &nbsp;|&nbsp; R — Reload<br>
    1 — Triggerman &nbsp;|&nbsp; 2 — Hunter &nbsp;|&nbsp; 3 — Run N Gun
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="crosshair"></div>

  <div id="health-wrap">
    <span id="health-icon">+</span>
    <div id="health-bar-bg"><div id="health-bar"></div></div>
    <span id="health-text">100</span>
  </div>

  <div id="ammo-wrap">
    <span id="ammo-clip">30</span>
    <span id="ammo-sep">/</span>
    <span id="ammo-total">90</span>
  </div>

  <div id="weapon-label">TRIGGERMAN — AR</div>
  <div id="class-hint">[1] [2] [3]</div>

  <div id="kills">Kills: 0</div>
  <div id="fps">0 FPS</div>
  <div id="kill-feed"></div>

  <div id="speed-indicator"></div>
  <div id="reload-text">Reloading...</div>
  <div id="bolt-text">Cycling...</div>
  <div id="hitmarker"></div>
  <div id="headshot-banner">HEADSHOT!</div>
</div>

<div id="damage-numbers"></div>
<div id="death-screen">
  <h2>YOU DIED</h2>
  <div id="death-stats"></div>
  <div id="death-countdown"></div>
</div>
<div id="damage-vignette"></div>
<canvas id="weapon-canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

/* ================================================================
   WEAPON CLASS DEFINITIONS
   ================================================================ */
const WEAPONS = {
  triggerman: {
    name: 'Triggerman',
    gunLabel: 'AR',
    damage: 25,
    headshotMulti: 2.0,
    clipSize: 30,
    totalAmmo: 90,
    reloadTime: 1.5,
    recoilKick: 0.025,
    recoilRecover: 0.2,
    fovADS: 45,
    speedMulti: 1.0,
    fireMode: 'semi',     // one shot per click
    fireRate: 0,           // no delay for semi
    spread: 0.005,
    boltTime: 0,
    gunColor: 0x555555,
    gunScale: [0.06, 0.06, 0.45],
    gunPos:   [0.25, -0.18, -0.5],
  },
  hunter: {
    name: 'Hunter',
    gunLabel: 'Sniper',
    damage: 90,
    headshotMulti: 2.0,   // 180 = one-shot headshot kill
    clipSize: 5,
    totalAmmo: 20,
    reloadTime: 2.5,
    recoilKick: 0.06,
    recoilRecover: 0.4,
    fovADS: 20,
    speedMulti: 0.8,
    fireMode: 'bolt',
    fireRate: 0.8,
    spread: 0.001,
    boltTime: 0.8,
    gunColor: 0x3a3a3a,
    gunScale: [0.04, 0.04, 0.7],
    gunPos:   [0.22, -0.16, -0.55],
  },
  runngun: {
    name: 'Run N Gun',
    gunLabel: 'SMG',
    damage: 12,
    headshotMulti: 2.0,
    clipSize: 30,
    totalAmmo: 120,
    reloadTime: 1.2,
    recoilKick: 0.015,
    recoilRecover: 0.1,
    fovADS: 55,
    speedMulti: 1.2,
    fireMode: 'auto',
    fireRate: 0.07,        // ~14 rounds/sec
    spread: 0.03,
    boltTime: 0,
    gunColor: 0x666666,
    gunScale: [0.05, 0.05, 0.3],
    gunPos:   [0.28, -0.2, -0.4],
  },
};

/* ================================================================
   CONFIG
   ================================================================ */
const CFG = {
  // Movement
  MOVE_SPEED:       8.0,
  STRAFE_MULTI:     1.2,
  JUMP_FORCE:       9.0,
  GRAVITY:         -25.0,
  CROUCH_HEIGHT:    0.9,
  STAND_HEIGHT:     1.7,
  CROUCH_SPEED:     0.45,

  // Slidehop
  SLIDE_BOOST:      1.5,
  SLIDE_DURATION:   0.4,

  // Bunny-hop
  BHOP_WINDOW:      0.15,
  BHOP_ACCEL:       1.08,
  BHOP_MAX:         1.6,

  // Physics
  AIR_CONTROL:      0.3,
  GROUND_FRICTION:  8.0,
  PLAYER_RADIUS:    0.4,

  // Mouse
  MOUSE_SENS:       0.002,

  // World
  ARENA_HALF:       40,
  WALL_HEIGHT:      8,
  FOV_NORMAL:       90,
  FOV_LERP_SPEED:   12,

  // Bot
  BOT_COUNT:        5,
  BOT_HP:           100,
  BOT_SPEED:        3.5,
  BOT_SIGHT_RANGE:  20,
  BOT_FACE_RANGE:   15,
  BOT_FIRE_RATE:    1.5,
  BOT_DAMAGE:       15,
  BOT_RESPAWN_TIME: 3.0,
  BOT_BODY_H:       1.2,
  BOT_BODY_W:       0.6,
  BOT_HEAD_SIZE:    0.4,

  // Regen
  REGEN_DELAY:      3.0,
  REGEN_RATE:       2,

  // Walk bob
  BOB_SPEED:        12,
  BOB_AMOUNT:       0.035,
};

/* ================================================================
   STATE
   ================================================================ */
const keys   = {};
const mouse  = { dx: 0, dy: 0 };
let mouseDown = false;  // for full-auto tracking

const player = {
  pos:         new THREE.Vector3(0, CFG.STAND_HEIGHT, 0),
  vel:         new THREE.Vector3(),
  yaw:         0,
  pitch:       0,
  onGround:    false,
  isCrouching: false,
  height:      CFG.STAND_HEIGHT,

  slideTimer:  0,
  slideMulti:  1,
  bhopMulti:   1,
  landTimer:   0,
  jumpChain:   0,

  health:      100,
  clipAmmo:    30,
  totalAmmo:   90,
  kills:       0,
  isReloading: false,
  reloadTimer: 0,
  isDead:      false,
  deathTimer:  0,
  lastDamageTime: -999,

  recoilOffset: 0,
  isADS: false,

  // Weapon
  weaponKey: 'triggerman',
  boltTimer: 0,        // bolt-action cooldown
  autoTimer: 0,        // full-auto fire interval

  // Walk bob
  bobPhase: 0,
  bobOffset: 0,
};

let locked = false;

function getWeapon() { return WEAPONS[player.weaponKey]; }

/* ================================================================
   THREE.JS SETUP
   ================================================================ */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.autoClear = false;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 60, 120);

const camera = new THREE.PerspectiveCamera(CFG.FOV_NORMAL, window.innerWidth / window.innerHeight, 0.1, 200);
scene.add(camera);

/* ── Weapon view model (separate scene + camera) ── */
const weaponScene  = new THREE.Scene();
const weaponCamera = new THREE.PerspectiveCamera(50, 280 / 200, 0.01, 10);
weaponCamera.position.set(0, 0, 0);
weaponScene.add(weaponCamera);
weaponScene.add(new THREE.AmbientLight(0xffffff, 0.6));
const weaponDirLight = new THREE.DirectionalLight(0xffffff, 0.8);
weaponDirLight.position.set(1, 2, 1);
weaponScene.add(weaponDirLight);

let weaponModel = null;

function buildWeaponModel() {
  if (weaponModel) weaponScene.remove(weaponModel);
  const w = getWeapon();
  const group = new THREE.Group();

  // Gun barrel
  const barrelGeo = new THREE.BoxGeometry(w.gunScale[0], w.gunScale[1], w.gunScale[2]);
  const barrelMat = new THREE.MeshLambertMaterial({ color: w.gunColor });
  const barrel = new THREE.Mesh(barrelGeo, barrelMat);
  group.add(barrel);

  // Magazine
  const magGeo = new THREE.BoxGeometry(w.gunScale[0] * 0.7, w.gunScale[1] * 2, w.gunScale[0] * 0.8);
  const magMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
  const mag = new THREE.Mesh(magGeo, magMat);
  mag.position.set(0, -w.gunScale[1] * 1.2, w.gunScale[2] * 0.15);
  group.add(mag);

  // Stock (back part)
  const stockGeo = new THREE.BoxGeometry(w.gunScale[0] * 1.1, w.gunScale[1] * 1.5, w.gunScale[2] * 0.3);
  const stockMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
  const stock = new THREE.Mesh(stockGeo, stockMat);
  stock.position.set(0, -w.gunScale[1] * 0.3, w.gunScale[2] * 0.55);
  group.add(stock);

  // Scope for sniper
  if (player.weaponKey === 'hunter') {
    const scopeGeo = new THREE.CylinderGeometry(0.015, 0.02, 0.12, 8);
    const scopeMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
    const scope = new THREE.Mesh(scopeGeo, scopeMat);
    scope.rotation.x = Math.PI / 2;
    scope.position.set(0, w.gunScale[1] * 0.9, -0.05);
    group.add(scope);
  }

  group.position.set(w.gunPos[0], w.gunPos[1], w.gunPos[2]);
  weaponScene.add(group);
  weaponModel = group;
}

buildWeaponModel();

/* ── Weapon view renderer ── */
const weaponCanvas = document.getElementById('weapon-canvas');
const weaponRenderer = new THREE.WebGLRenderer({ canvas: weaponCanvas, alpha: true, antialias: true });
weaponRenderer.setPixelRatio(window.devicePixelRatio);
weaponRenderer.setSize(280, 200);

/* ================================================================
   LIGHTING
   ================================================================ */
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dirLight = new THREE.DirectionalLight(0xfff4e0, 0.9);
dirLight.position.set(30, 50, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left   = -CFG.ARENA_HALF;
dirLight.shadow.camera.right  =  CFG.ARENA_HALF;
dirLight.shadow.camera.top    =  CFG.ARENA_HALF;
dirLight.shadow.camera.bottom = -CFG.ARENA_HALF;
dirLight.shadow.camera.near   = 1;
dirLight.shadow.camera.far    = 120;
scene.add(dirLight);

/* ================================================================
   MAP GEOMETRY
   ================================================================ */
const colliders = [];

function addBox(w, h, d, x, y, z, color) {
  const geo  = new THREE.BoxGeometry(w, h, d);
  const mat  = new THREE.MeshLambertMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  colliders.push(new THREE.Box3().setFromObject(mesh));
  return mesh;
}

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(CFG.ARENA_HALF * 2, CFG.ARENA_HALF * 2),
  new THREE.MeshLambertMaterial({ color: 0x8fbc8f })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Walls
const WH = CFG.WALL_HEIGHT, AH = CFG.ARENA_HALF, wc = 0x9e9e9e;
addBox(AH*2,WH,1, 0,WH/2,AH, wc);
addBox(AH*2,WH,1, 0,WH/2,-AH, wc);
addBox(1,WH,AH*2, AH,WH/2,0, wc);
addBox(1,WH,AH*2, -AH,WH/2,0, wc);

// Buildings
addBox(10,6,10, 0,3,0, 0xb0826e);
addBox(4,0.5,8, 7,1.5,0, 0xc4a882);
addBox(6,4,6, 20,2,15, 0x7e8cc4);
addBox(6,5,6, -18,2.5,-12, 0xc47e7e);
addBox(8,3,5, 12,1.5,-20, 0x7ec4a0);
addBox(5,7,5, -25,3.5,20, 0xc4b87e);
addBox(7,4,7, 25,2,-25, 0x8a7ec4);
addBox(4,3,12, -10,1.5,25, 0x7ec4c4);

// Low cover
addBox(8,1.5,1, 10,0.75,8, 0xa0a0a0);
addBox(1,1.5,8, -8,0.75,-6, 0xa0a0a0);
addBox(6,1.5,1, 0,0.75,18, 0xa0a0a0);
addBox(1,1.5,6, 18,0.75,-5, 0xa0a0a0);

// Platforms
addBox(12,2,6, -20,1,5, 0xb89e7e);
addBox(6,1,6, -14,0.5,5, 0xc4b08a);

/* ================================================================
   MUZZLE FLASH
   ================================================================ */
const muzzleFlashMat = new THREE.MeshBasicMaterial({ color: 0xffffaa, transparent: true, opacity: 0 });
const muzzleFlash = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6), muzzleFlashMat);
muzzleFlash.position.set(0.3, -0.25, -0.8);
camera.add(muzzleFlash);
let muzzleFlashTimer = 0;

/* ================================================================
   BOT SYSTEM
   ================================================================ */
const bots = [];
const botSpawnPoints = [
  new THREE.Vector3(20,0,15), new THREE.Vector3(-18,0,-12),
  new THREE.Vector3(12,0,-20), new THREE.Vector3(-25,0,20),
  new THREE.Vector3(25,0,-25), new THREE.Vector3(-10,0,25),
  new THREE.Vector3(15,0,-10), new THREE.Vector3(-15,0,10),
];
const BOT_COLORS = [0xe85d5d, 0x5d8de8, 0x5de89e, 0xe8c95d, 0xc45de8];

function createBotMesh(idx) {
  const group = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(CFG.BOT_BODY_W, CFG.BOT_BODY_H, CFG.BOT_BODY_W),
    new THREE.MeshLambertMaterial({ color: BOT_COLORS[idx % BOT_COLORS.length] })
  );
  body.position.y = CFG.BOT_BODY_H / 2;
  body.castShadow = true;
  body.name = 'body';
  group.add(body);

  const head = new THREE.Mesh(
    new THREE.BoxGeometry(CFG.BOT_HEAD_SIZE, CFG.BOT_HEAD_SIZE, CFG.BOT_HEAD_SIZE),
    new THREE.MeshLambertMaterial({ color: 0xf0d0b0 })
  );
  head.position.y = CFG.BOT_BODY_H + CFG.BOT_HEAD_SIZE / 2;
  head.castShadow = true;
  head.name = 'head';
  group.add(head);

  const hpBg = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 0.08),
    new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide })
  );
  hpBg.position.y = CFG.BOT_BODY_H + CFG.BOT_HEAD_SIZE + 0.2;
  hpBg.name = 'hpBg';
  group.add(hpBg);

  const hpFill = new THREE.Mesh(
    new THREE.PlaneGeometry(0.8, 0.08),
    new THREE.MeshBasicMaterial({ color: 0xff3333, side: THREE.DoubleSide })
  );
  hpFill.position.y = CFG.BOT_BODY_H + CFG.BOT_HEAD_SIZE + 0.2;
  hpFill.name = 'hpFill';
  group.add(hpFill);

  return group;
}

function getRandomSpawn() {
  const sp = botSpawnPoints[Math.floor(Math.random() * botSpawnPoints.length)];
  return new THREE.Vector3(sp.x + (Math.random()-0.5)*6, 0, sp.z + (Math.random()-0.5)*6);
}

function spawnBot(index) {
  const mesh = createBotMesh(index);
  mesh.position.copy(getRandomSpawn());
  scene.add(mesh);
  const bot = {
    mesh, hp: CFG.BOT_HP, alive: true, index,
    fireTimer: CFG.BOT_FIRE_RATE * Math.random(),
    wanderDir: new THREE.Vector3(Math.random()-0.5, 0, Math.random()-0.5).normalize(),
    wanderTimer: 1 + Math.random(),
    respawnTimer: 0, deathAnim: 0,
  };
  bots.push(bot);
  return bot;
}

for (let i = 0; i < CFG.BOT_COUNT; i++) spawnBot(i);

/* ================================================================
   SHOOTING
   ================================================================ */
const raycaster = new THREE.Raycaster();

function getBotMeshes() {
  const meshes = [];
  for (const bot of bots) {
    if (!bot.alive) continue;
    bot.mesh.traverse(c => {
      if (c.isMesh && (c.name === 'body' || c.name === 'head')) meshes.push(c);
    });
  }
  return meshes;
}

function findBotByMesh(mesh) {
  for (const bot of bots) {
    let found = false;
    bot.mesh.traverse(c => { if (c === mesh) found = true; });
    if (found) return bot;
  }
  return null;
}

function canFire() {
  if (player.isDead || player.isReloading) return false;
  if (player.clipAmmo <= 0) { startReload(); return false; }
  const w = getWeapon();
  if (w.fireMode === 'bolt' && player.boltTimer > 0) return false;
  if (w.fireMode === 'auto' && player.autoTimer > 0) return false;
  return true;
}

function shootWeapon() {
  if (!canFire()) return;
  const w = getWeapon();

  player.clipAmmo--;
  player.recoilOffset += w.recoilKick;

  // Bolt/auto cooldown
  if (w.fireMode === 'bolt') player.boltTimer = w.boltTime;
  if (w.fireMode === 'auto') player.autoTimer = w.fireRate;

  // Muzzle flash
  muzzleFlashMat.opacity = 1;
  muzzleFlashTimer = 0.05;

  // Weapon model kick
  if (weaponModel) {
    weaponModel.position.z += 0.04;
  }

  // Spread
  const spreadAmount = w.spread * (player.isADS ? 0.3 : 1.0);
  const spreadVec = new THREE.Vector2(
    (Math.random() - 0.5) * spreadAmount,
    (Math.random() - 0.5) * spreadAmount
  );

  raycaster.setFromCamera(spreadVec, camera);
  const hits = raycaster.intersectObjects(getBotMeshes(), false);

  if (hits.length > 0) {
    const hit = hits[0];
    const bot = findBotByMesh(hit.object);
    if (bot && bot.alive) {
      const isHead = hit.object.name === 'head';
      const damage = Math.round(w.damage * (isHead ? w.headshotMulti : 1));
      bot.hp -= damage;
      showHitmarker(isHead);
      spawnDamageNumber(damage, isHead, hit.point);
      if (isHead) showHeadshotBanner();
      if (bot.hp <= 0) killBot(bot);
    }
  }

  if (player.clipAmmo <= 0 && player.totalAmmo > 0) startReload();
}

function startReload() {
  if (player.isReloading) return;
  const w = getWeapon();
  if (player.clipAmmo >= w.clipSize) return;
  if (player.totalAmmo <= 0) return;
  player.isReloading = true;
  player.reloadTimer = w.reloadTime;
}

function finishReload() {
  const w = getWeapon();
  const needed = w.clipSize - player.clipAmmo;
  const avail = Math.min(needed, player.totalAmmo);
  player.clipAmmo += avail;
  player.totalAmmo -= avail;
  player.isReloading = false;
}

/* ================================================================
   WEAPON SWITCHING
   ================================================================ */
function switchWeapon(key) {
  if (player.weaponKey === key) return;
  player.weaponKey = key;
  const w = getWeapon();
  player.clipAmmo = w.clipSize;
  player.totalAmmo = w.totalAmmo;
  player.isReloading = false;
  player.reloadTimer = 0;
  player.boltTimer = 0;
  player.autoTimer = 0;
  buildWeaponModel();
}

   DAMAGE NUMBERS

const elDmgContainer = document.getElementById('damage-numbers');

function spawnDamageNumber(damage, isHead, worldPos) {
  // Project 3D position to screen
  const v = worldPos.clone().project(camera);
  const x = (v.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-v.y * 0.5 + 0.5) * window.innerHeight;

  const el = document.createElement('div');
  el.className = 'dmg-num ' + (isHead ? 'head' : 'body');
  el.textContent = damage;
  el.style.left = (x + (Math.random()-0.5) * 30) + 'px';
  el.style.top  = (y - 20) + 'px';
  elDmgContainer.appendChild(el);

  setTimeout(() => el.remove(), 800);
}

}

/* ================================================================
   KILL FEED
   ================================================================ */
const elKillFeed = document.getElementById('kill-feed');
const killFeedEntries = [];

function addKillFeedEntry(botIndex) {
  const el = document.createElement('div');
  el.className = 'kill-entry';
  el.textContent = 'You killed Bot ' + (botIndex + 1);
  elKillFeed.appendChild(el);
  killFeedEntries.push({ el, timer: 4.0 });

  // Keep only last 3
  while (killFeedEntries.length > 3) {
    const old = killFeedEntries.shift();
    old.el.remove();
  }
}

function updateKillFeed(dt) {
  for (let i = killFeedEntries.length - 1; i >= 0; i--) {
    const entry = killFeedEntries[i];
    entry.timer -= dt;
    if (entry.timer < 0.5) entry.el.classList.add('fading');
    if (entry.timer <= 0) {
      entry.el.remove();
      killFeedEntries.splice(i, 1);
    }
  }
}

/* ================================================================
   BOT DEATH / RESPAWN
   ================================================================ */
function killBot(bot) {
  bot.alive = false;
  bot.hp = 0;
  bot.deathAnim = 0.4;
  bot.respawnTimer = CFG.BOT_RESPAWN_TIME;
  player.kills++;
  addKillFeedEntry(bot.index);
}

function respawnBot(bot) {
  bot.mesh.position.copy(getRandomSpawn());
  bot.mesh.scale.set(1, 1, 1);
  bot.mesh.rotation.set(0, 0, 0);
  bot.mesh.visible = true;
  bot.hp = CFG.BOT_HP;
  bot.alive = true;
  bot.fireTimer = CFG.BOT_FIRE_RATE * (0.5 + Math.random() * 0.5);
  bot.wanderTimer = 1 + Math.random();
  bot.wanderDir.set(Math.random()-0.5, 0, Math.random()-0.5).normalize();
  bot.deathAnim = 0;
  const hpFill = bot.mesh.getObjectByName('hpFill');
  if (hpFill) hpFill.scale.x = 1;
}

const elDeathScreen = document.getElementById('death-screen');
const elDeathStats = document.getElementById('death-stats');
const elDeathCountdown = document.getElementById('death-countdown');
const elDamageVignette = document.getElementById('damage-vignette');

function killPlayer() {
  player.isDead = true;
  player.deathTimer = 2.0;
  player.health = 0;
  elDeathStats.textContent = 'Kills: ' + player.kills;
  elDeathScreen.classList.add('visible');
}

function respawnPlayer() {
  player.isDead = false;
  player.health = 100;
  player.pos.set(0, CFG.STAND_HEIGHT, 30);
  player.vel.set(0, 0, 0);
  const w = getWeapon();
  player.clipAmmo = w.clipSize;
  player.totalAmmo = w.totalAmmo;
  player.isReloading = false;
  player.lastDamageTime = -999;
  player.boltTimer = 0;
  player.autoTimer = 0;
  elDeathScreen.classList.remove('visible');
}

function damagePlayer(amount, gt) {
  if (player.isDead) return;
  player.health -= amount;
  player.lastDamageTime = gt;
  elDamageVignette.classList.add('flash');
  setTimeout(() => elDamageVignette.classList.remove('flash'), 150);
  if (player.health <= 0) killPlayer();
}

/* ================================================================
   COLLISION
   ================================================================ */
function playerAABB(pos, height) {
  const r = CFG.PLAYER_RADIUS;
  return new THREE.Box3(
    new THREE.Vector3(pos.x - r, pos.y - height, pos.z - r),
    new THREE.Vector3(pos.x + r, pos.y + 0.1,     pos.z + r)
  );
}

function tryMove(pos, height, axis, delta) {
  const test = pos.clone();
  test[axis] += delta;
  const aabb = playerAABB(test, height);
  for (const box of colliders) {
    if (aabb.intersectsBox(box)) return true;
  }
  pos[axis] += delta;
  return false;
}

  if (hp > 60) elHealthBar.style.background = '#ff4444';

  elSpeed.textContent = hSpeed + ' u/s';

/* ================================================================
   FPS COUNTER
   ================================================================ */
let fpsFrames = 0, fpsTime = 0, fpsDisplay = 0;

function updateFPS(dt) {
  fpsFrames++;
  fpsTime += dt;
  if (fpsTime >= 0.5) {
    fpsDisplay = Math.round(fpsFrames / fpsTime);
    fpsFrames = 0;
    fpsTime = 0;
  }
  elFPS.textContent = fpsDisplay + ' FPS';
}

/* ================================================================
   BOT AI
   ================================================================ */
function updateBots(dt, gt) {
  for (const bot of bots) {
    if (!bot.alive) {
      if (bot.deathAnim > 0) {
        bot.deathAnim -= dt;
        const t = bot.deathAnim / 0.4;
        bot.mesh.scale.y = Math.max(0.01, t);
        bot.mesh.position.y = -CFG.BOT_BODY_H * (1 - t) * 0.5;
        if (bot.deathAnim <= 0) bot.mesh.visible = false;
      }
      bot.respawnTimer -= dt;
      if (bot.respawnTimer <= 0) respawnBot(bot);
      continue;
    }

    const bp = bot.mesh.position;
    const toP = new THREE.Vector3().subVectors(player.pos, bp);
    toP.y = 0;
    const dist = toP.length();

    if (dist < CFG.BOT_FACE_RANGE) {
      bot.mesh.rotation.y = Math.atan2(toP.x, toP.z);
    }

    bot.wanderTimer -= dt;
    if (bot.wanderTimer <= 0) {
      bot.wanderDir.set(Math.random()-0.5, 0, Math.random()-0.5).normalize();
      bot.wanderTimer = 1 + Math.random() * 1.5;
    }

    const moveDir = (dist < CFG.BOT_SIGHT_RANGE && dist > 5)
      ? toP.clone().normalize() : bot.wanderDir;

    bp.x += moveDir.x * CFG.BOT_SPEED * dt;
    bp.z += moveDir.z * CFG.BOT_SPEED * dt;
    bp.y = 0;
    const bnd = CFG.ARENA_HALF - 2;
    bp.x = Math.max(-bnd, Math.min(bnd, bp.x));
    bp.z = Math.max(-bnd, Math.min(bnd, bp.z));

    if (dist < CFG.BOT_SIGHT_RANGE) {
      bot.fireTimer -= dt;
      if (bot.fireTimer <= 0) {
        bot.fireTimer = CFG.BOT_FIRE_RATE;
        const hitChance = 0.6 - (dist / CFG.BOT_SIGHT_RANGE) * 0.3;
        if (Math.random() < hitChance) damagePlayer(CFG.BOT_DAMAGE, gt);
      }
    }

    const hpFill = bot.mesh.getObjectByName('hpFill');
    if (hpFill) hpFill.scale.x = Math.max(0, bot.hp / CFG.BOT_HP);
  }
}

/* ================================================================
   GAME LOOP
   ================================================================ */
let prevTime = performance.now();
let gameTime = 0;

function tick() {
  requestAnimationFrame(tick);

  const now = performance.now();
  let dt = (now - prevTime) / 1000;
  prevTime = now;
  if (dt > 0.1) dt = 0.1;
  gameTime += dt;

  updateFPS(dt);

  if (!locked) {
    renderer.clear();
    renderer.render(scene, camera);
    weaponRenderer.render(weaponScene, weaponCamera);
    return;
  }

  const w = getWeapon();

  /* ── Player death ── */
  if (player.isDead) {
    player.deathTimer -= dt;
    elDeathCountdown.textContent = 'Respawn in ' + Math.ceil(player.deathTimer) + 's';
    if (player.deathTimer <= 0) respawnPlayer();
    updateHUD();
    updateBots(dt, gameTime);
    updateKillFeed(dt);
    renderer.clear();
    renderer.render(scene, camera);
    weaponRenderer.render(weaponScene, weaponCamera);
    return;
  }

  /* ── Mouse look ── */
  player.yaw   -= mouse.dx * CFG.MOUSE_SENS;
  player.pitch  -= mouse.dy * CFG.MOUSE_SENS;
  player.pitch   = Math.max(-Math.PI/2 + 0.01, Math.min(Math.PI/2 - 0.01, player.pitch));
  mouse.dx = 0;
  mouse.dy = 0;

  /* ── Recoil recovery ── */
  if (player.recoilOffset > 0) {
    player.recoilOffset -= dt / w.recoilRecover * w.recoilKick;
    if (player.recoilOffset < 0) player.recoilOffset = 0;
  }

  /* ── ADS FOV ── */
  const targetFOV = player.isADS ? w.fovADS : CFG.FOV_NORMAL;
  camera.fov += (targetFOV - camera.fov) * Math.min(1, dt * CFG.FOV_LERP_SPEED);
  camera.updateProjectionMatrix();

  /* ── Bolt / auto timers ── */
  if (player.boltTimer > 0) player.boltTimer -= dt;
  if (player.autoTimer > 0) player.autoTimer -= dt;

  // Full-auto: keep firing while mouse held
  if (mouseDown && w.fireMode === 'auto' && player.autoTimer <= 0) {
    shootWeapon();
  }

  /* ── Reload ── */
  if (player.isReloading) {
    player.reloadTimer -= dt;
    if (player.reloadTimer <= 0) finishReload();
  }

  /* ── Health regen ── */
  if (player.health < 100 && (gameTime - player.lastDamageTime) > CFG.REGEN_DELAY) {
    player.health = Math.min(100, player.health + CFG.REGEN_RATE * dt);
  }

  /* ── Muzzle flash ── */
  if (muzzleFlashTimer > 0) {
    muzzleFlashTimer -= dt;
    if (muzzleFlashTimer <= 0) muzzleFlashMat.opacity = 0;
  }

  /* ── Hitmarker ── */
  if (hitmarkerTimer > 0) {
    hitmarkerTimer -= dt;
    if (hitmarkerTimer <= 0) elHitmarker.className = '';
  }

  /* ── Headshot banner ── */
  if (headshotTimer > 0) {
    headshotTimer -= dt;
    if (headshotTimer <= 0) elHeadshotBanner.classList.remove('visible');
  }

  /* ── Kill feed ── */
  updateKillFeed(dt);

  /* ── Crouch ── */
  const wantCrouch = !!keys['ShiftLeft'] || !!keys['ShiftRight'];
  if (wantCrouch && !player.isCrouching) {
    player.isCrouching = true;
  } else if (!wantCrouch && player.isCrouching) {
    const testPos = player.pos.clone();
    testPos.y += (CFG.STAND_HEIGHT - CFG.CROUCH_HEIGHT);
    const aabb = playerAABB(testPos, CFG.STAND_HEIGHT);
    let blocked = false;
    for (const box of colliders) {
      if (aabb.intersectsBox(box)) { blocked = true; break; }
    }
    if (!blocked) player.isCrouching = false;
  }

  const targetHeight = player.isCrouching ? CFG.CROUCH_HEIGHT : CFG.STAND_HEIGHT;
  player.height += (targetHeight - player.height) * Math.min(1, dt * 12);

  /* ── Wish direction ── */
  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right   = new THREE.Vector3(forward.z, 0, -forward.x);

  const wish = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'])    wish.add(forward);
  if (keys['KeyS'] || keys['ArrowDown'])  wish.sub(forward);
  if (keys['KeyA'] || keys['ArrowLeft'])  wish.sub(right);
  if (keys['KeyD'] || keys['ArrowRight']) wish.add(right);

  const isDiag = (keys['KeyW'] || keys['ArrowUp'] || keys['KeyS'] || keys['ArrowDown']) &&
                 (keys['KeyA'] || keys['ArrowLeft'] || keys['KeyD'] || keys['ArrowRight']);

  if (wish.lengthSq() > 0) wish.normalize();

  /* ── Speed multipliers (includes weapon class speed) ── */
  let speedMulti = w.speedMulti;
  if (isDiag)               speedMulti *= CFG.STRAFE_MULTI;
  if (player.isCrouching)   speedMulti *= CFG.CROUCH_SPEED;
  if (player.slideTimer > 0) speedMulti *= player.slideMulti;
  speedMulti *= player.bhopMulti;
  if (player.isADS) speedMulti *= 0.7;

  const moveSpeed = CFG.MOVE_SPEED * speedMulti;

  /* ── Ground / air accel ── */
  if (player.onGround) {
    const friction = Math.max(0, 1 - CFG.GROUND_FRICTION * dt);
    player.vel.x *= friction;
    player.vel.z *= friction;
    player.vel.x += wish.x * moveSpeed * dt * 10;
    player.vel.z += wish.z * moveSpeed * dt * 10;
    const hSpeed = Math.sqrt(player.vel.x**2 + player.vel.z**2);
    if (hSpeed > moveSpeed) {
      player.vel.x *= moveSpeed / hSpeed;
      player.vel.z *= moveSpeed / hSpeed;
    }
  } else {
    player.vel.x += wish.x * moveSpeed * CFG.AIR_CONTROL * dt * 10;
    player.vel.z += wish.z * moveSpeed * CFG.AIR_CONTROL * dt * 10;
  }

  /* ── Gravity ── */
  player.vel.y += CFG.GRAVITY * dt;

  /* ── Slide / land timers ── */
  if (player.slideTimer > 0) {
    player.slideTimer -= dt;
    player.slideMulti += (1 - player.slideMulti) * Math.min(1, dt * 4);
  }
  if (player.landTimer > 0) player.landTimer -= dt;

  /* ── Jump ── */
  if (keys['Space'] && player.onGround) {
    player.vel.y = CFG.JUMP_FORCE;
    player.onGround = false;
    if (player.landTimer > 0) {
      player.jumpChain++;
      player.bhopMulti = Math.min(CFG.BHOP_MAX, player.bhopMulti * CFG.BHOP_ACCEL);
    } else {
      player.jumpChain = 0;
      player.bhopMulti = 1;
    }
  }

  /* ── Collision ── */
  const wasOnGround = player.onGround;
  const blockedY = tryMove(player.pos, player.height, 'y', player.vel.y * dt);
  if (blockedY) {
    if (player.vel.y < 0) {
      if (!wasOnGround) {
        player.onGround = true;
        player.landTimer = CFG.BHOP_WINDOW;
        if (player.isCrouching && Math.sqrt(player.vel.x**2 + player.vel.z**2) > 2) {
          player.slideTimer = CFG.SLIDE_DURATION;
          player.slideMulti = CFG.SLIDE_BOOST;
        }
      }
      player.onGround = true;
    }
    player.vel.y = 0;
  } else {
    if (player.onGround) {
      const gc = player.pos.clone(); gc.y -= 0.05;
      const aabb = playerAABB(gc, player.height);
      let supported = gc.y - player.height <= 0.01;
      for (const box of colliders) { if (aabb.intersectsBox(box)) { supported = true; break; } }
      if (!supported) player.onGround = false;
    }
  }

  if (tryMove(player.pos, player.height, 'x', player.vel.x * dt)) player.vel.x = 0;
  if (tryMove(player.pos, player.height, 'z', player.vel.z * dt)) player.vel.z = 0;

  if (player.pos.y - player.height < 0) {
    player.pos.y = player.height;
    if (player.vel.y < 0) {
      if (!player.onGround) {
        player.landTimer = CFG.BHOP_WINDOW;
        if (player.isCrouching && Math.sqrt(player.vel.x**2+player.vel.z**2) > 2) {
          player.slideTimer = CFG.SLIDE_DURATION;
          player.slideMulti = CFG.SLIDE_BOOST;
        }
      }
      player.vel.y = 0;
      player.onGround = true;
    }
  }

  const bnd = CFG.ARENA_HALF - CFG.PLAYER_RADIUS - 0.6;
  player.pos.x = Math.max(-bnd, Math.min(bnd, player.pos.x));
  player.pos.z = Math.max(-bnd, Math.min(bnd, player.pos.z));

  if (player.onGround && player.landTimer <= 0 && player.bhopMulti > 1) {
    player.bhopMulti += (1 - player.bhopMulti) * Math.min(1, dt * 5);
    if (player.bhopMulti < 1.01) player.bhopMulti = 1;
  }

  /* ── Walk bob ── */
  const hVel = Math.sqrt(player.vel.x**2 + player.vel.z**2);
  if (player.onGround && hVel > 1) {
    player.bobPhase += dt * CFG.BOB_SPEED * (hVel / CFG.MOVE_SPEED);
    player.bobOffset = Math.sin(player.bobPhase) * CFG.BOB_AMOUNT * (hVel / CFG.MOVE_SPEED);
  } else {
    player.bobOffset *= 0.9;
    if (Math.abs(player.bobOffset) < 0.001) player.bobOffset = 0;
  }

  /* ── Camera ── */
  camera.position.copy(player.pos);
  camera.position.y += player.bobOffset;
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch + player.recoilOffset;

  /* ── Update bots ── */
  updateBots(dt, gameTime);

  /* ── Billboard HP bars ── */
  for (const bot of bots) {
    if (!bot.alive) continue;
    bot.mesh.traverse(c => {
      if (c.isMesh && c.name !== 'body' && c.name !== 'head') c.lookAt(camera.position);
    });
  }

  /* ── Weapon model sway ── */
  if (weaponModel) {
    const wp = getWeapon();
    // Recover from shot kick
    weaponModel.position.z += (wp.gunPos[2] - weaponModel.position.z) * Math.min(1, dt * 15);
    // Sway
    weaponModel.rotation.y = Math.sin(gameTime * 1.5) * 0.01;
    weaponModel.rotation.x = Math.cos(gameTime * 1.2) * 0.005 + player.recoilOffset * 2;
  }

  /* ── HUD ── */
  updateHUD();

  /* ── Render ── */
  renderer.clear();
  renderer.render(scene, camera);
  weaponRenderer.render(weaponScene, weaponCamera);
}

// Spawn
player.pos.set(0, CFG.STAND_HEIGHT, 30);
tick();
</script>
